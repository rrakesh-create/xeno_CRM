<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Xeno CRM is an advanced marketing and shopper engagement platform designed to empower direct-to-consumer brands with actionable AI-driven insights and multi-channel campaign capabilities." />
    <meta name="keywords" content="CRM, marketing, e-commerce, D2C, customer engagement, AI campaigns" />
    <meta property="og:title" content="Xeno CRM | Marketing & Shopper Engagement Hub" />
    <meta property="og:description" content="Advanced marketing and shopper engagement platform with AI-driven insights." />
    <meta property="og:type" content="website" />
    <title>Xeno CRM | Marketing & Shopper Engagement Hub</title>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        document.body.innerHTML = '<div style="color:red;font-size:20px;padding:20px;background:white;z-index:9999;position:absolute;top:0;left:0;">' + msg + '<br/>' + (error && error.stack ? error.stack : '') + '</div>';
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML = '<div style="color:red;font-size:20px;padding:20px;background:white;z-index:9999;position:absolute;top:0;left:0;">' + event.reason + '</div>';
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
